name: Build DLL

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

env:
  SODIUM_STATIC: "1"

jobs:
  build:

    runs-on: windows-2022

    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
            triplet: x64-windows-static

          - target: i686-pc-windows-msvc
            arch: x86
            triplet: x86-windows-static

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Dependency tree
        shell: pwsh
        run: |
          cargo tree -i libsodium-sys
          cargo tree -i sodiumoxide

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: lukka/run-vcpkg@v11

      - name: Install manifest dependencies
        shell: pwsh
        run: |
          vcpkg install --triplet ${{ matrix.triplet }}

      - uses: Swatinem/rust-cache@v2

      - name: Inspect libsodium package
        shell: pwsh
        run: |
          Get-ChildItem "$env:USERPROFILE\.cargo\git\checkouts" -Recurse -Directory -Filter msvc |
            ForEach-Object {
              Write-Host "MSVC dir: $($_.FullName)"
              Get-ChildItem $_.FullName -Recurse
            }

      - name: Show environment
        shell: pwsh
        run: |
          rustc -vV
          echo HOST=$env:HOST
          echo TARGET=$env:TARGET
          echo CARGO_BUILD_TARGET=$env:CARGO_BUILD_TARGET

      - name: Force x86 libsodium
        if: matrix.target == 'i686-pc-windows-msvc'
        shell: pwsh
        run: |
          $root = Get-ChildItem "$env:USERPROFILE\.cargo\git\checkouts" -Recurse -Directory |
            Where-Object { $_.FullName -like "*libsodium-sys\\msvc" } |
            Select-Object -First 1

          echo "SODIUM_LIB_DIR=$($root.FullName)\Win32\Release\v142" >> $env:GITHUB_ENV

      - name: Verify libsodium
        shell: pwsh
        run: |
          Write-Host "SODIUM_LIB_DIR=$env:SODIUM_LIB_DIR"
          Get-ChildItem $env:SODIUM_LIB_DIR

      - name: Build
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
          VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.triplet }}
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: rustdeskid-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/*.dll
